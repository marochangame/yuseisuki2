<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ユーセーくん</title>
  <meta name="theme-color" content="#fff4b7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ユーセーくん②" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="start-screen" id="startScreen">
      <div class="start-card">
        <div class="fox start-fox" aria-hidden="true">
          <div class="tail"></div><div class="ear ear-l"></div><div class="ear ear-r"></div>
          <div class="body"></div><div class="face"><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="cheek cheek-l"></div><div class="cheek cheek-r"></div><div class="nose"></div><div class="mouth"></div></div>
        </div>
        <button id="startBtn" class="start-btn" type="button">はじめる</button>
      </div>
    </section>

    <section class="game-screen" id="gameScreen" aria-hidden="true">
      <div class="sparkle sp1"></div><div class="sparkle sp2"></div>
      <section class="hero">
        <div class="fox hero-fox" id="heroFox" aria-hidden="true">
          <div class="tail"></div><div class="ear ear-l"></div><div class="ear ear-r"></div>
          <div class="body"></div><div class="face"><div class="eye eye-l"></div><div class="eye eye-r"></div><div class="cheek cheek-l"></div><div class="cheek cheek-r"></div><div class="nose"></div><div class="mouth"></div></div>
        </div>
      </section>
      <section class="choices" aria-label="えらぶ">
        <button class="choice" id="leftChoice" type="button" aria-label="ひだり"><span class="item" id="leftItem"></span></button>
        <button class="choice" id="rightChoice" type="button" aria-label="みぎ"><span class="item" id="rightItem"></span></button>
      </section>
      <button class="sound-btn" id="soundBtn" type="button" aria-label="もういちど">♪</button>
      <div class="turn-counter" id="turnCounter">1 / 5</div>
      <div class="reaction" id="reaction" aria-hidden="true">
        <div class="burst"></div>
        <div class="reaction-text" id="reactionText">やった！</div>
      </div>
    </section>

    <section class="finish-screen" id="finishScreen" aria-hidden="true">
      <div class="finish-card">
        <div class="finish-title">できたね！</div>
        <div class="finish-stars" aria-hidden="true">✨ 🎉 ✨</div>
        <button id="appleBtn" class="apple-btn" type="button" aria-label="もういっかいやる">🍎</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
